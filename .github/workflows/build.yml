name: Build ByteMenu

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid xz
          sudo git clone --recursive https://github.com/theos/theos $THEOS
          curl -LO https://github.com/theos/sdks/archive/master.tar.gz
          tar -xzf master.tar.gz
          sudo mv sdks-master/*.sdk $THEOS/sdks/
        env:
          THEOS: /opt/theos

      - name: Build
        run: make package
        env:
          THEOS: /opt/theos

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: ByteMenu-deb
          path: packages/*.deb
