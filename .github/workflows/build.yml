name: Build ByteMenu

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Theos
        run: |
          brew install ldid xz
          git clone --recursive https://github.com/theos/theos $THEOS
          curl -LO https://github.com/theos/sdks/archive/master.tar.gz
          tar -xzf master.tar.gz
          mv sdks-master/*.sdk $THEOS/sdks/
        env:
          THEOS: /opt/theos

      - name: Create Tweak files
        run: |
          mkdir -p ByteMenu
          cat > ByteMenu/Tweak.x << 'EOF'
          #import <UIKit/UIKit.h>
          static UIWindow* menuWindow = nil;
          static UIView* menuPanel = nil;
          static BOOL menuVisible = NO;
          static void toggleMenu() {
              menuVisible = !menuVisible;
              menuPanel.hidden = !menuVisible;
          }
          %ctor {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(3.0 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  menuWindow = [[UIWindow alloc] initWithFrame:[UIScreen mainScreen].bounds];
                  menuWindow.windowLevel = 1000;
                  menuWindow.backgroundColor = [UIColor clearColor];
                  menuWindow.hidden = NO;
                  menuWindow.userInteractionEnabled = YES;
                  [menuWindow makeKeyAndVisible];
                  UIButton* eBtn = [UIButton buttonWithType:UIButtonTypeSystem];
                  eBtn.frame = CGRectMake(12, 60, 44, 44);
                  eBtn.backgroundColor = [UIColor blueColor];
                  eBtn.layer.cornerRadius = 10;
                  eBtn.layer.masksToBounds = YES;
                  [eBtn setTitle:@"E" forState:UIControlStateNormal];
                  [eBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
                  [menuWindow addSubview:eBtn];
                  menuPanel = [[UIView alloc] initWithFrame:CGRectMake(12, 114, 280, 380)];
                  menuPanel.backgroundColor = [UIColor colorWithRed:0.0 green:0.4 blue:0.8 alpha:0.9];
                  menuPanel.layer.cornerRadius = 16;
                  menuPanel.layer.masksToBounds = YES;
                  menuPanel.hidden = YES;
                  [menuWindow addSubview:menuPanel];
                  UILabel* lbl = [[UILabel alloc] initWithFrame:CGRectMake(0, 8, 280, 30)];
                  lbl.text = @"Byte Menu";
                  lbl.textAlignment = NSTextAlignmentCenter;
                  lbl.textColor = [UIColor whiteColor];
                  [menuPanel addSubview:lbl];
              });
          }
          EOF

          cat > ByteMenu/Makefile << 'EOF'
          ARCHS = arm64
          TARGET = iphone:clang:14.5:14.0
          include $(THEOS)/makefiles/common.mk
          TWEAK_NAME = ByteMenu
          ByteMenu_FILES = Tweak.x
          ByteMenu_CFLAGS = -fobjc-arc -Wno-unused-function
          ByteMenu_FRAMEWORKS = UIKit Foundation
          include $(THEOS)/makefiles/tweak.mk
          EOF

          cat > ByteMenu/control << 'EOF'
          Package: com.emder.bytemenu
          Name: Byte Menu
          Version: 1.1.0
          Architecture: iphoneos-arm
          Description: Byte Menu for Yeeps Companion
          Maintainer: emder
          Section: Tweaks
          Depends: mobilesubstrate
          EOF

      - name: Build
        run: |
          cd ByteMenu
          make package
        env:
          THEOS: /opt/theos

      - name: Upload deb
        uses: actions/upload-artifact@v3
        with:
          name: ByteMenu-deb
          path: ByteMenu/packages/*.deb
